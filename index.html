<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contador de Maní</title>
  <link rel="stylesheet" href="./estilos.css" />
</head>
<body>
  <button id="hamburger">☰</button>
  <header>
    
    <h1>Contador</h1>
    
  </header>

  <main class="contenedor">
    <div class="botones-wrapper">
      <button id="btnContador" class="btn-contador" disabled>
        <div id="contadorDisplay" class="contador-display">0</div>
      </button>
      <button id="btnIniciar" class="btn-iniciar visible">INICIAR</button>
    </div>

    <section class="acciones">
      <h2>Acciones</h2>
      <label for="accionSelect">Selecciona acción:</label>
      <select id="accionSelect"></select>
    </section>

    <!-- Resumen de producción -->
    <section id="resumenProduccion" class="resumen visible">
      <!-- Render dinámico -->
    </section>

    <div class="resumen-buttons">
      <button id="toggleResumen">Ocultar</button>
      <button id="clearResumen">Limpiar Resumen</button>
    </div>

    <button id="btnGuardar">Guardar</button>
  </main>

  <div id="overlayMenu">
    <a href="calendario.html" class="btn-link">Ir al calendario</a>
  </div>

  <footer class="pie">
    
  </footer>

  <script type="module" src="./acciones.js"></script>
  <script type="module" src="./JsMain.js"></script>
</body>
</html>
